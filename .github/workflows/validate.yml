name: Validate

on:
  push:
    branches: [main]
    paths: ['SKILL.md', 'scripts/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4
      - run: python -c "import json; exec(open('scripts/audit.py').read()); print('audit.py loads OK')"
